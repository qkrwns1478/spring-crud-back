<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card mb-4">
    <div class="card-body">
        <h3 class="card-title" th:text="${post.title}">제목</h3>
        <h6 class="card-subtitle mb-2 text-muted">
            작성자: <span th:text="${post.writer}"></span> | 작성일: <span th:text="${post.createdAt}"></span>
        </h6>
        <hr>
        <p class="card-text" style="white-space: pre-line;" th:text="${post.content}">내용</p>
    </div>
    <div class="card-footer text-end">
        <a th:href="@{/view/posts/{id}/edit(id=${post.id})}" class="btn btn-warning btn-sm">수정</a>
        <button class="btn btn-danger btn-sm" th:onclick="'deletePost(' + ${post.id} + ')'">삭제</button>
        <a th:href="@{/view/posts}" class="btn btn-secondary btn-sm">목록으로</a>
    </div>
</div>

<div class="mt-5">
    <h5>댓글 (<span th:text="${#lists.size(comments)}">0</span>)</h5>
    <div class="list-group mb-3">
        <div th:each="comment : ${comments}" class="list-group-item">
            <div class="d-flex w-100 justify-content-between">
                <h6 class="mb-1" th:text="${comment.writer}">작성자</h6>
                <small th:text="${comment.createdAt}">날짜</small>
            </div>
            <p class="mb-1" th:text="${comment.content}">댓글 내용</p>
        </div>
    </div>
</div>
</body>
</html>
