<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">자유 게시판</h2>
<div class="text-end mb-3">
    <a th:href="@{/view/posts/write}" class="btn btn-primary">글쓰기</a>
</div>
<table class="table table-hover">
    <thead class="table-light">
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.id}">1</td>
        <td><a th:href="@{/view/posts/{id}(id=${post.id})}" th:text="${post.title}">제목</a></td>
        <td th:text="${post.writer}">작성자</td>
        <td th:text="${post.createdAt}">2024-01-01</td>
    </tr>
    </tbody>
</table>
</body>
</html>
