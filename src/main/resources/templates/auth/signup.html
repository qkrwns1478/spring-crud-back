<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="mx-auto" style="max-width: 400px;">
    <h3 class="text-center mb-4">회원가입</h3>
    <form id="signupForm">
        <div class="mb-3">
            <label class="form-label">아이디 (4~20자)</label>
            <input type="text" class="form-control" id="username" required minlength="4" maxlength="20">
        </div>
        <div class="mb-3">
            <label class="form-label">비밀번호 (8자 이상)</label>
            <input type="password" class="form-control" id="password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-success w-100">가입하기</button>
    </form>
    <div class="mt-3 text-center">
        <a href="/view/login">이미 계정이 있으신가요? 로그인</a>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        fetch('/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(res => {
                if(res.ok) {
                    alert('회원가입이 완료되었습니다.');
                    location.href = '/view/login';
                } else {
                    return res.json().then(err => { throw new Error(err.message); });
                }
            })
            .catch(err => alert(err.message));
    });
</script>
</body>
</html>
